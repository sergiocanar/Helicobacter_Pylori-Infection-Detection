program: finetune_encoder.py
method: bayes
run_cap: 30

command:
  - env
  - CUDA_VISIBLE_DEVICES=7
  - python
  - ${program}
  - --fold
  - "2"          # ← change to 2 or 3 before registering the next sweep
  - ${args}

metric:
  goal: maximize
  name: val/f1

parameters:
  # Primary comparison: ImageNet init vs HOPE-AI (LSTMModel) init
  checkpoint:
    value: /home/scanar/endovis/models/Helicobacter_Pylori-Infection-Detection/Code-HOPE-AI/weights/model.pth              # HOPE-AI / LSTMModel pretrained

  # Learning rate — log-uniform range (bayes samples in log space)
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3

  # Weight decay — log-uniform range
  weight_decay:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2

  # Fixed training settings
  epochs:
    value: 30
  batch_size:
    value: 64
  img_size:
    value: 352
  warmup_epochs:
    value: 3
  num_classes:
    value: 2
  output_dir:
    value: outputs/sweep
